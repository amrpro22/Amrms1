<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>متوقف مؤقتاً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0B2F5F 0%, #0A1C3A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        /* البطاقة الرئيسية */
        .pause-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 35px 65px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
        }

        /* أيقونة كبيرة */
        .pause-icon {
            font-size: 5.8rem;
            margin-bottom: 1.2rem;
            display: inline-block;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
        }

        /* شارة الحالة */
        .status-chip {
            background: #E53E3E;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.4rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-bottom: 1.7rem;
            box-shadow: 0 2px 8px rgba(229,62,62,0.3);
        }

        .status-chip span:first-child {
            font-size: 1.2rem;
        }

        /* العنوان الرئيسي */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1A202C;
            margin-bottom: 0.75rem;
            letter-spacing: -0.3px;
        }

        /* النص الوصفي البسيط */
        .pause-description {
            color: #2D3748;
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            font-weight: 500;
            background: #F7FAFC;
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            width: auto;
        }

        /* عداد الوقت (ميزة اضافية بسيطة) */
        .timer-block {
            background: #EDF2F7;
            border-radius: 2rem;
            padding: 1rem;
            margin: 1.5rem 0 2rem;
        }

        .timer-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #4A5568;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .timer-value {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 800;
            color: #E53E3E;
            background: #FFFFFF;
            display: inline-block;
            padding: 0.25rem 1.2rem;
            border-radius: 3rem;
            box-shadow: inset 0 1px 3px #0001, 0 1px 0 white;
        }

        /* رسالة التوقف المؤقت فقط – بدون أزرار تفاعلية */
        .simple-note {
            margin-top: 1.8rem;
            font-size: 0.85rem;
            color: #718096;
            border-top: 1px solid #E2E8F0;
            padding-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* تذييل بسيط */
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #A0AEC0;
        }

        /* حركة خفيفة */
        @keyframes softPulse {
            0% { opacity: 0.7; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.02);}
        }

        .pause-icon {
            animation: softPulse 2s infinite alternate ease-in-out;
        }

        /* استجابة الجوال */
        @media (max-width: 500px) {
            .pause-card {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .timer-value {
                font-size: 1.5rem;
                padding: 0.2rem 1rem;
            }
        }
    </style>
</head>
<body>

<div class="pause-card">
    <!-- أيقونة التوقف المؤقت -->
    <div class="pause-icon">⏸️</div>

    <!-- شارة الحالة -->
    <div class="status-chip">
        <span>⏳</span>
        <span>مُعَلَّق / متوقف مؤقتاً</span>
    </div>

    <!-- عنوان رئيسي -->
    <h1>الخدمة متوقفة حالياً</h1>

    <!-- نص توضيحي قصير -->
    <div class="pause-description">
        ⚠️ تم إيقاف النظام بشكل مؤقت<br>
        سيتم العودة قريباً
    </div>

    <!-- مؤقت زمني منذ التوقف (يبدأ تلقائياً من لحظة فتح الصفحة) -->
    <div class="timer-block">
        <div class="timer-label">⏱️ منذ التوقف المؤقت</div>
        <div class="timer-value" id="pauseTimer">00:00:00</div>
    </div>

    <!-- ملاحظة بسيطة (لا يوجد أزرار تفاعلية، مجرد إشعار) -->
    <div class="simple-note">
        <span>🔒</span>  الوضع: متوقف مؤقتاً  <span>🔒</span>
    </div>
    <footer>
        ⚡ سيتم استئناف العمل بعد الانتهاء من الصيانة
    </footer>
</div>

<script>
    // المتغيرات الخاصة بالمؤقت التلقائي (مجرد عداد يظهر وقت التوقف)
    let pauseStartTime = new Date();   // لحظة تحميل الصفحة = بداية التوقف المؤقت
    let timerInterval = null;

    function updatePauseDuration() {
        if (!pauseStartTime) return;
        const now = new Date();
        const diffMs = now - pauseStartTime;  // الفرق بالمللي ثانية
        
        // حساب الساعات والدقائق والثواني
        const totalSeconds = Math.floor(diffMs / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        
        // تنسيق: HH:MM:SS
        const formatted = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        const timerElement = document.getElementById('pauseTimer');
        if (timerElement) {
            timerElement.textContent = formatted;
        }
    }
    
    // بدء تشغيل المؤقت فوراً
    function initTimer() {
        // تعيين وقت البدء إذا كان localStorage يخزن شيئاً (اختياري لا حاجة له، نبدأ من الان)
        // لكن نجعله ثابت من لحظة فتح الصفحة، مناسب لعرض "متوقف موقتاً منذ...."
        if (!pauseStartTime) {
            pauseStartTime = new Date();
        }
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updatePauseDuration, 1000);
        updatePauseDuration(); // تحديث فوري
    }
    
    // بدء العمل
    initTimer();

    // (اختياري) عند مغادرة الصفحة أو إعادة تحميلها، لا مشكلة; 
    // ولكن لإظهار التوقف المؤقت فقط، لا نضيف أي ازرار استئناف — متوافق مع الطلب
    // ملاحظة: حتى لو تم إعادة تحميل الصفحة يبدأ المؤقت من جديد، وهذا طبيعي في شاشة "متوقف مؤقتاً"
    
    // تدبير نظيف عند إغلاق الصفحة لوقف المؤقت - مجرد تحسين
    window.addEventListener('beforeunload', function() {
        if (timerInterval) clearInterval(timerInterval);
    });
</script>
</body>
</html>
