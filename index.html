<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقيع قانون صندوق محبران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; min-height: 100vh; }
        .law-item { transition: all 0.3s ease; border-right: 4px solid transparent; cursor: pointer; }
        .law-item.active { background-color: #f0f9ff; border-right-color: #2563eb; }
        .custom-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: #2563eb; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="py-6 px-4">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
    <!-- Header -->
    <div class="sticky-header p-6 text-center">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-900">قانون صندوق مساعدة الحالات المرضية</h1>
        <p class="text-blue-600 font-medium mt-1">قرية محبران - ميثاق الالتزام والتكافل الاجتماعي</p>
        
        <div class="mt-4 bg-blue-50 rounded-full h-2 w-full max-w-md mx-auto overflow-hidden">
            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
        </div>
        <p id="progressText" class="text-[10px] text-gray-400 mt-2 font-bold uppercase">يرجى قراءة والموافقة على جميع البنود (0/20)</p>
    </div>

    <!-- Law Items Container -->
    <div class="p-4 md:p-8 space-y-4 max-h-[50vh] overflow-y-auto" id="lawContainer">
        <!-- JS Content -->
    </div>

    <!-- Signature Section -->
    <div class="p-6 md:p-10 bg-gray-50 border-t border-gray-100">
        <div class="max-w-md mx-auto space-y-4">
            <div class="space-y-2 text-center">
                <label class="block text-sm font-bold text-gray-700">التوقيع بالاسم الثلاثي:</label>
                <input type="text" id="fullName" placeholder="اكتب اسمك الثلاثي هنا..." 
                    class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200 focus:border-blue-600 outline-none text-center font-bold">
            </div>
            
            <button id="submitBtn" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-lg cursor-not-allowed transition-all flex items-center justify-center gap-3 active:scale-95">
                <span id="btnLabel">أكمل الموافقة على البنود</span>
                <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- Table -->
    <div class="p-6 bg-white border-t border-gray-100">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
            سجل الملتزمين المعتمدين
        </h3>
        <div class="overflow-x-auto rounded-2xl border border-gray-100">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-50 text-gray-600 font-bold">
                    <tr>
                        <th class="px-4 py-3">الاسم</th>
                        <th class="px-4 py-3">تاريخ التوقيع</th>
                        <th class="px-4 py-3 text-center">الحالة</th>
                    </tr>
                </thead>
                <tbody id="signaturesTableBody" class="divide-y divide-gray-50">
                    <tr><td colspan="3" class="px-4 py-10 text-center text-gray-400 italic">جاري الاتصال...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFHGULzGX0hLPL2biSNPGEEj5boxOLilk",
      authDomain: "amr4ever-aa8c1.firebaseapp.com",
      projectId: "amr4ever-aa8c1",
      storageBucket: "amr4ever-aa8c1.firebasestorage.app",
      messagingSenderId: "382786367992",
      appId: "1:382786367992:web:05d3e60df34fd68870260d",
      measurementId: "G-KFBPYPHEW4"
    };

    const lawData = [
        "يلتزم الجميع بمبدأ التكافل الاجتماعي والمشاركة المجتمعية الفعالة بين جميع أبناء القرية لتعزيز أواصر التعاون.",
        "يتم تنظيم كافة التبرعات المالية وتوثيقها رسمياً عبر إدارة الصندوق حصراً لضمان الشفافية والمحاسبة.",
        "يشمل نطاق تغطية الصندوق تكاليف العلاج المباشر، العمليات الجراحية الضرورية، والفحوصات الطبية المتخصصة فقط.",
        "تنتهي مسؤولية الصندوق المالية تجاه أي حالة مرضية فور وفاة الحالة (لا يشمل الدعم تكاليف العزاء أو الديون).",
        "الحالات المرضية البسيطة التي تقل تكلفتها عن 200 ألف ريال لا يشملها الدعم إذا كان رب الأسرة مقتدراً مادياً.",
        "تخضع جميع الطلبات لعملية تحقق صارمة من قبل اللجنة للتأكد من صحة الحالة الطبية ومدى احتياجها الفعلي للدعم.",
        "تتم إدارة الصندوق والقيادة التنفيذية بواسطة: مصطفى الشجاع، أحمد الشجاع، نبيل الشجاع، ومحمد الشجاع.",
        "يُعتمد نظام دعم الحالات الطارئة والحرجة بسقف مالي يصل إلى 2 مليون ريال يمني كحد أقصى للحالة الواحدة.",
        "يتم اعتماد نظام الشورى والتصويت الجماعي في كافة القرارات المصيرية المتعلقة بتطوير أو تعديل قوانين الصندوق.",
        "يلتزم جميع الأعضاء بالسرية التامة لخصوصية العمل والبيانات المتداولة داخل المجموعة الرسمية للصندوق.",
        "يُمنع منعاً باتاً إثارة الشقاق أو الفتن أو نقل الأخبار المغلوطة التي قد تؤثر على سمعة الصندوق أو تماسك القرية.",
        "الالتزام الكامل بالحكمة والهدوء والأسلوب الحضاري في كافة النقاشات والحوارات المتعلقة بأعمال الصندوق.",
        "يلتزم جميع المشتركين بالحضور والتفاعل المستمر في الاجتماعات والأنشطة التي تقررها إدارة الصندوق.",
        "تمتلك الإدارة الصلاحية الكاملة في إعفاء أو استبعاد الأعضاء المقصرين في واجباتهم أو المخالفين لميثاق الالتزام.",
        "يُحرم من دعم الصندوق كل من يثبت قيامه بجمع تبرعات خارجية سرية أو فردية دون التنسيق المسبق مع الإدارة.",
        "تكون الأولوية في صرف الدعم للحالات الأشد خطراً على الحياة، مع ربط حق الحصول على الدعم بواجب الالتزام بالصندوق.",
        "تعتمد الإدارة مبدأ الشفافية الكاملة عبر توفير سجل مالي دوري يوضح كافة المداخيل والمساهمات والمصروفات.",
        "يلتزم أعضاء الإدارة واللجنة التنفيذية بتقديم مساهماتهم المالية أولاً ليكونوا قدوة لجميع أبناء القرية.",
        "يُعد القرار الجماعي المتخذ من قبل الأغلبية ملزماً للجميع، ويجب احترامه والعمل به دون أي معارضة معرقلة.",
        "يقر الموقع بتقديم المصلحة العامة للقرية وأهداف الصندوق السامية فوق كافة المصالح الشخصية أو الخلافات الفردية."
    ];

    // Build UI
    const lawContainer = document.getElementById('lawContainer');
    lawData.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = "law-item p-5 rounded-2xl border border-gray-100 bg-gray-50/50 flex gap-5 items-start leading-relaxed";
        div.innerHTML = `<input type="checkbox" class="item-check custom-checkbox mt-1 shrink-0"><div class="flex-1"><p class="text-gray-800 font-bold text-sm">البند ${i+1}:</p><p class="text-gray-700 text-sm leading-7 mt-1">${text}</p></div>`;
        div.onclick = (e) => { if(e.target.type !== 'checkbox') div.querySelector('input').click(); };
        lawContainer.appendChild(div);
    });

    const checks = document.querySelectorAll('.item-check');
    const submitBtn = document.getElementById('submitBtn');
    const fullNameInput = document.getElementById('fullName');
    const progressBar = document.getElementById('progressBar');
    const tableBody = document.getElementById('signaturesTableBody');

    const validate = () => {
        const checked = Array.from(checks).filter(c => c.checked).length;
        const name = fullNameInput.value.trim();
        progressBar.style.width = `${(checked/20)*100}%`;
        if (checked === 20 && name.length >= 8) {
            submitBtn.disabled = false;
            submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            document.getElementById('btnLabel').textContent = "إرسال التوقيع";
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            document.getElementById('btnLabel').textContent = checked < 20 ? "وافق على البنود أولاً" : "اكتب اسمك الثلاثي";
        }
    };

    checks.forEach(c => c.onchange = validate);
    fullNameInput.oninput = validate;

    // Firebase Logic
    try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const startListening = async () => {
            try {
                await signInAnonymously(auth);
                const q = query(collection(db, "signatures"), orderBy("at", "desc"));
                onSnapshot(q, (snap) => {
                    tableBody.innerHTML = '';
                    if(snap.empty) {
                        tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-400">لا يوجد موقعون حتى الآن</td></tr>';
                        return;
                    }
                    snap.forEach(doc => {
                        const d = doc.data();
                        const date = d.at ? new Date(d.at.seconds * 1000).toLocaleString('ar-EG') : 'الآن';
                        tableBody.insertAdjacentHTML('beforeend', `<tr class="border-b border-gray-50"><td class="px-4 py-4 font-bold text-gray-800">${d.name}</td><td class="px-4 py-4 text-gray-400 text-xs">${date}</td><td class="px-4 py-4 text-center text-green-600 font-bold">✓ مُلتزم</td></tr>`);
                    });
                }, (err) => {
                    console.error("Snapshot error:", err);
                    tableBody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500 font-bold">خطأ في الأذونات: تأكد من ضغط زر Publish في الـ Rules</td></tr>`;
                });
            } catch (authErr) {
                console.error("Auth error:", authErr);
                tableBody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500 font-bold">يرجى تفعيل "Anonymous Auth" في لوحة تحكم Firebase</td></tr>`;
            }
        };

        startListening();

        submitBtn.onclick = async () => {
            submitBtn.disabled = true;
            document.getElementById('btnLoader').classList.remove('hidden');
            try {
                await addDoc(collection(db, "signatures"), { name: fullNameInput.value.trim(), at: serverTimestamp() });
                alert("تم التوقيع بنجاح!");
                location.reload();
            } catch (e) {
                alert("خطأ أثناء الحفظ. تأكد من تفعيل قواعد البيانات وقسم الـ Auth.");
                submitBtn.disabled = false;
                document.getElementById('btnLoader').classList.add('hidden');
            }
        };
    } catch (initErr) {
        tableBody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500">خطأ في إعدادات Firebase</td></tr>`;
    }
</script>
</body>
</html>
