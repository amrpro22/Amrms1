<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقيع قانون صندوق محبران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .law-item { transition: all 0.2s ease; border-right: 4px solid transparent; }
        .law-item.active { background-color: #f0f9ff; border-right-color: #2563eb; }
        .custom-checkbox { width: 24px; height: 24px; cursor: pointer; accent-color: #2563eb; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="py-6 px-4">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
    <!-- Header -->
    <div class="sticky-header p-6 text-center">
        <h1 class="text-2xl font-bold text-blue-900">قانون صندوق مساعدة الحالات المرضية</h1>
        <p class="text-blue-600 font-medium mt-1">قرية محبران - ميثاق الالتزام والتكافل</p>
        
        <div class="mt-4 bg-blue-50 rounded-full h-2 w-full max-w-xs mx-auto overflow-hidden">
            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
        </div>
        <p id="progressText" class="text-[10px] text-gray-400 mt-2 font-bold">يرجى الموافقة على جميع البنود (0/20)</p>
    </div>

    <!-- Laws List -->
    <div class="p-4 md:p-8 space-y-3 max-h-[50vh] overflow-y-auto" id="lawContainer">
        <!-- JS will inject laws here -->
    </div>

    <!-- Signature Section -->
    <div class="p-6 md:p-10 bg-slate-50 border-t border-gray-100">
        <div class="max-w-md mx-auto space-y-4 text-center">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700">التوقيع بالاسم الثلاثي:</label>
                <input type="text" id="fullName" placeholder="اكتب اسمك الثلاثي هنا..." 
                    class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200 focus:border-blue-600 outline-none transition-all text-lg text-center font-bold">
            </div>
            
            <button id="submitBtn" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-lg cursor-not-allowed transition-all active:scale-95">
                إرسال التوقيع والالتزام
            </button>
            
            <div class="pt-2">
                <p class="text-[11px] text-gray-500 font-bold">تطوير عمرو مسعد الشجاع . إشراف مصطفى الشجاع</p>
            </div>
        </div>
    </div>

    <!-- Real-time Table -->
    <div class="p-6 bg-white border-t border-gray-100">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
            سجل الموقعين المعتمدين
        </h3>
        <div class="overflow-x-auto rounded-2xl border border-gray-100">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-50 text-gray-600 font-bold">
                    <tr>
                        <th class="px-4 py-3">الاسم</th>
                        <th class="px-4 py-3">تاريخ التوقيع</th>
                        <th class="px-4 py-3">الحالة</th>
                    </tr>
                </thead>
                <tbody id="signaturesTableBody" class="divide-y divide-gray-50">
                    <tr>
                        <td colspan="3" class="px-4 py-8 text-center text-gray-400 italic">جاري تحميل سجل الموقعين...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyBFHGULzGX0hLPL2biSNPGEEj5boxOLilk",
      authDomain: "amr4ever-aa8c1.firebaseapp.com",
      projectId: "amr4ever-aa8c1",
      storageBucket: "amr4ever-aa8c1.firebasestorage.app",
      messagingSenderId: "382786367992",
      appId: "1:382786367992:web:05d3e60df34fd68870260d",
      measurementId: "G-KFBPYPHEW4"
    };

    const lawData = [
        "مبدأ التكافل والمشاركة المجتمعية بين أبناء القرية.",
        "تنظيم التبرعات وتوثيقها رسمياً عبر الصندوق حصراً.",
        "نطاق تغطية الصندوق (علاج، عمليات، فحوصات).",
        "انتهاء مسؤولية الصندوق المالية فور وفاة الحالة.",
        "الحالات البسيطة (أقل من 200 ألف) لا يشملها الدعم للمقتدرين.",
        "التحقق الصارم من صحة الحالات واحتياجها الفعلي.",
        "القيادة التنفيذية: مصطفى، أحمد، نبيل، ومحمد الشجاع.",
        "نظام دعم الحالات الطارئة بسقف 2 مليون ريال.",
        "اعتماد نظام الشورى والتصويت في القرارات المصيرية.",
        "السرية التامة لخصوصية العمل داخل المجموعة.",
        "منع إثارة الشقاق أو الفتن أو نقل الأخبار.",
        "الالتزام بالحكمة والهدوء في كافة النقاشات.",
        "الالتزام بالحضور والتفاعل المستمر للأعضاء.",
        "صلاحية الإدارة في إعفاء الأعضاء المقصرين.",
        "حرمان من يجمع تبرعات خارجية سراً من دعم الصندوق.",
        "الأولوية للحالات الأشد خطراً وربط الحق بالواجب.",
        "الشفافية الكاملة وتوفر رابط مالي للمساهمات.",
        "التزام أعضاء الإدارة واللجنة بتقديم مساهماتهم أولاً.",
        "احترام القرار الجماعي بعد اعتماده من الأغلبية.",
        "تقديم المصلحة العامة للقرية على المصالح الشخصية."
    ];

    const lawContainer = document.getElementById('lawContainer');
    lawData.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = "law-item p-4 rounded-xl border border-gray-100 bg-gray-50/50 flex gap-4";
        div.innerHTML = `
            <input type="checkbox" class="item-check custom-checkbox mt-1 shrink-0">
            <div>
                <h3 class="font-bold text-gray-800 text-sm">${i+1}. ${text}</h3>
            </div>
        `;
        lawContainer.appendChild(div);
    });

    const checks = document.querySelectorAll('.item-check');
    const submitBtn = document.getElementById('submitBtn');
    const fullNameInput = document.getElementById('fullName');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const tableBody = document.getElementById('signaturesTableBody');

    const validate = () => {
        const checkedCount = Array.from(checks).filter(c => c.checked).length;
        const name = fullNameInput.value.trim();
        progressBar.style.width = `${(checkedCount/20)*100}%`;
        progressText.textContent = `الموافقة على البنود (${checkedCount}/20)`;
        
        if (checkedCount === 20 && name.length >= 8) {
            submitBtn.disabled = false;
            submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            submitBtn.classList.remove('cursor-not-allowed');
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            submitBtn.classList.add('cursor-not-allowed');
        }
    };

    checks.forEach(c => c.addEventListener('change', () => {
        c.closest('.law-item').classList.toggle('active', c.checked);
        validate();
    }));
    fullNameInput.addEventListener('input', validate);

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const loadSignatures = async () => {
        try {
            await signInAnonymously(auth);
            // جلب البيانات مع ترتيبها من الأحدث للأقدم
            onSnapshot(collection(db, "signatures"), (snapshot) => {
                tableBody.innerHTML = '';
                const docs = snapshot.docs.map(d => d.data()).sort((a,b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
                
                if (docs.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" class="px-4 py-8 text-center text-gray-400">لا توجد توقيعات حتى الآن</td></tr>';
                    return;
                }

                docs.forEach(data => {
                    const date = data.at ? new Date(data.at.seconds * 1000).toLocaleDateString('ar-EG') : 'الآن';
                    tableBody.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-4 py-3 font-bold text-gray-800">${data.name}</td>
                            <td class="px-4 py-3 text-gray-500 text-xs">${date}</td>
                            <td class="px-4 py-3 text-green-600 font-bold">✓ مُعتمد</td>
                        </tr>
                    `);
                });
            });
        } catch (e) {
            console.error("Firebase Auth Error:", e);
        }
    };

    loadSignatures();

    submitBtn.addEventListener('click', async () => {
        const nameValue = fullNameInput.value.trim();
        submitBtn.disabled = true;
        submitBtn.textContent = "جاري الحفظ...";

        try {
            await addDoc(collection(db, "signatures"), {
                name: nameValue,
                at: serverTimestamp()
            });
            alert("تم تسجيل توقيعك بنجاح في سجلات صندوق محبران.");
            fullNameInput.value = '';
            checks.forEach(c => { c.checked = false; c.closest('.law-item').classList.remove('active'); });
            validate();
            submitBtn.textContent = "إرسال التوقيع والالتزام";
        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء الحفظ. يرجى المحاولة لاحقاً.");
            submitBtn.disabled = false;
            submitBtn.textContent = "إرسال التوقيع والالتزام";
        }
    });
</script>

</body>
</html>
