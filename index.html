<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقيع قانون صندوق محبران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .law-item { transition: all 0.2s; border-right: 4px solid transparent; }
        .law-item.active { background: #eff6ff; border-right-color: #2563eb; }
        .custom-checkbox { width: 22px; height: 22px; accent-color: #2563eb; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
    <div class="sticky-header p-6 text-center">
        <h1 class="text-2xl font-bold text-slate-800">قانون صندوق محبران</h1>
        <p class="text-blue-600 text-sm">ميثاق الالتزام والتكافل الاجتماعي</p>
        <div class="mt-4 bg-gray-100 rounded-full h-2 w-full max-w-xs mx-auto overflow-hidden">
            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
        </div>
        <p id="progressText" class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest">يرجى الموافقة على جميع البنود (0/20)</p>
    </div>

    <div class="p-4 space-y-3 max-h-[50vh] overflow-y-auto" id="lawContainer">
        <!-- Laws list -->
    </div>

    <div class="p-6 bg-slate-50 border-t border-gray-100 text-center">
        <div class="max-w-sm mx-auto space-y-4">
            <input type="text" id="fullName" placeholder="أدخل اسمك الثلاثي للتوقيع" 
                class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200 focus:border-blue-600 outline-none text-center font-bold text-lg">
            
            <button id="submitBtn" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                <span id="btnLabel">أرسل التوقيع</span>
                <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
            <p class="text-[10px] text-gray-400">تطوير عمرو مسعد الشجاع . إشراف مصطفى الشجاع</p>
        </div>
    </div>

    <div class="p-6 bg-white border-t border-gray-100">
        <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
            قائمة الملتزمين المعتمدة (تحديث فوري)
        </h3>
        <div class="overflow-hidden rounded-2xl border border-gray-100">
            <table class="w-full text-right text-sm">
                <thead class="bg-slate-50 text-slate-500">
                    <tr>
                        <th class="px-4 py-3">الاسم</th>
                        <th class="px-4 py-3">التاريخ</th>
                        <th class="px-4 py-3">الحالة</th>
                    </tr>
                </thead>
                <tbody id="signaturesTableBody" class="divide-y divide-gray-50">
                    <tr><td colspan="3" class="px-4 py-8 text-center text-gray-300 italic">جاري الاتصال بقاعدة البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // الإعدادات الخاصة بمشروعك (amr4ever-aa8c1)
    const firebaseConfig = {
      apiKey: "AIzaSyBFHGULzGX0hLPL2biSNPGEEj5boxOLilk",
      authDomain: "amr4ever-aa8c1.firebaseapp.com",
      projectId: "amr4ever-aa8c1",
      storageBucket: "amr4ever-aa8c1.firebasestorage.app",
      messagingSenderId: "382786367992",
      appId: "1:382786367992:web:05d3e60df34fd68870260d",
      measurementId: "G-KFBPYPHEW4"
    };

    const lawData = [
        "مبدأ التكافل والمشاركة المجتمعية بين أبناء القرية.",
        "تنظيم التبرعات وتوثيقها رسمياً عبر الصندوق حصراً.",
        "نطاق تغطية الصندوق (علاج، عمليات، فحوصات).",
        "انتهاء مسؤولية الصندوق المالية فور وفاة الحالة.",
        "الحالات البسيطة لا يشملها الدعم للمقتدرين ماديًا.",
        "التحقق الصارم من صحة الحالات واحتياجها الفعلي.",
        "القيادة التنفيذية: مصطفى، أحمد، نبيل، ومحمد الشجاع.",
        "نظام دعم الحالات الطارئة بسقف 2 مليون ريال.",
        "اعتماد نظام الشورى والتصويت في القرارات المصيرية.",
        "السرية التامة لخصوصية العمل داخل المجموعة.",
        "منع إثارة الشقاق أو الفتن أو نقل الأخبار.",
        "الالتزام بالحكمة والهدوء في كافة النقاشات.",
        "الالتزام بالحضور والتفاعل المستمر للأعضاء.",
        "صلاحية الإدارة في إعفاء الأعضاء المقصرين.",
        "حرمان من يجمع تبرعات خارجية سراً من دعم الصندوق.",
        "الأولوية للحالات الأشد خطراً وربط الحق بالواجب.",
        "الشفافية الكاملة وتوفر رابط مالي للمساهمات.",
        "التزام أعضاء الإدارة واللجنة بتقديم مساهماتهم أولاً.",
        "احترام القرار الجماعي بعد اعتماده من الأغلبية.",
        "تقديم المصلحة العامة للقرية على المصالح الشخصية."
    ];

    const container = document.getElementById('lawContainer');
    lawData.forEach((text, i) => {
        const item = document.createElement('div');
        item.className = "law-item p-4 rounded-xl border border-gray-100 flex gap-4 items-start";
        item.innerHTML = `<input type="checkbox" class="item-check custom-checkbox mt-1 shrink-0"><p class="text-sm font-bold text-slate-700">${i+1}. ${text}</p>`;
        item.onclick = (e) => { if(e.target.type !== 'checkbox') item.querySelector('input').click(); };
        container.appendChild(item);
    });

    const checks = document.querySelectorAll('.item-check');
    const submitBtn = document.getElementById('submitBtn');
    const fullNameInput = document.getElementById('fullName');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const tableBody = document.getElementById('signaturesTableBody');

    const updateStatus = () => {
        const checked = Array.from(checks).filter(c => c.checked).length;
        const nameValid = fullNameInput.value.trim().length >= 8;
        progressBar.style.width = `${(checked/20)*100}%`;
        progressText.textContent = `الموافقة (${checked}/20)`;
        
        if(checked === 20 && nameValid) {
            submitBtn.disabled = false;
            submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');
        }
    };

    checks.forEach(c => c.onchange = (e) => {
        e.target.closest('.law-item').classList.toggle('active', e.target.checked);
        updateStatus();
    });
    fullNameInput.oninput = updateStatus;

    // Firebase Init
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const init = async () => {
        try {
            await signInAnonymously(auth);
            // جلب البيانات من مجموعتك الخاصة "signatures"
            const q = query(collection(db, "signatures"), orderBy("at", "desc"));
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(d => d.data());
                tableBody.innerHTML = data.length ? '' : '<tr><td colspan="3" class="p-8 text-center text-gray-400">لا توجد توقيعات بعد</td></tr>';
                data.forEach(item => {
                    const date = item.at ? new Date(item.at.seconds * 1000).toLocaleDateString('ar-EG') : 'الآن';
                    tableBody.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-3 font-bold text-slate-800">${item.name}</td>
                            <td class="px-4 py-3 text-slate-400 text-xs">${date}</td>
                            <td class="px-4 py-3 text-green-600 font-bold text-[10px]">✓ معتمد</td>
                        </tr>
                    `);
                });
            });
        } catch(e) { console.error(e); }
    };
    init();

    submitBtn.onclick = async () => {
        const name = fullNameInput.value.trim();
        submitBtn.disabled = true;
        document.getElementById('btnLoader').classList.remove('hidden');
        try {
            await addDoc(collection(db, "signatures"), { name, at: serverTimestamp() });
            alert("تم تسجيل توقيعك بنجاح في قاعدة بياناتك الخاصة!");
            fullNameInput.value = '';
            checks.forEach(c => c.checked = false);
            updateStatus();
            document.getElementById('btnLoader').classList.add('hidden');
        } catch(e) {
            alert("خطأ: تأكد من ضغط زر Publish في الـ Rules");
            submitBtn.disabled = false;
            document.getElementById('btnLoader').classList.add('hidden');
        }
    };
</script>
</body>
</html>
