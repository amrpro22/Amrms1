<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقيع قانون صندوق محبران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
        }

        .law-item {
            transition: all 0.3s ease;
            border-right: 4px solid transparent;
        }

        .law-item.active {
            background-color: #f0f9ff;
            border-right-color: #2563eb;
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #2563eb;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body class="py-8 px-4">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
    <!-- Header -->
    <div class="sticky-header border-b border-gray-100 p-6 text-center">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-900">قانون صندوق مساعدة الحالات المرضية</h1>
        <p class="text-blue-600 font-medium mt-1">قرية محبران - ميثاق الالتزام والتكافل</p>
        
        <div class="mt-4 bg-blue-50 rounded-full h-2 w-full max-w-md mx-auto overflow-hidden">
            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
        </div>
        <p id="progressText" class="text-xs text-gray-500 mt-2">يرجى الموافقة على جميع البنود (0/20)</p>
    </div>

    <!-- Law Sections Container -->
    <div class="p-6 md:p-10 space-y-4 max-h-[60vh] overflow-y-auto" id="lawContainer">
        <!-- JS will populate items 1-20 here -->
    </div>

    <!-- Final Signing Section -->
    <div class="p-6 md:p-10 bg-gray-50 border-t border-gray-100">
        <div class="max-w-md mx-auto space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700">الاسم الكامل (التوقيع الإلكتروني):</label>
                <input type="text" id="fullName" placeholder="اكتب اسمك الثلاثي للموافقة..." 
                    class="w-full px-5 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:ring-0 outline-none transition-all text-lg">
            </div>
            
            <button id="submitBtn" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-lg cursor-not-allowed transition-all flex items-center justify-center gap-3">
                <span>يجب إكمال المتطلبات</span>
                <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
            
            <div class="text-center">
                <p class="text-[11px] text-gray-400 font-medium">تطوير عمرو مسعد الشجاع . اشراف مصطفى الشجاع</p>
            </div>
            <p id="errorMsg" class="text-red-500 text-xs text-center font-medium hidden"></p>
        </div>
    </div>

    <!-- Table of Signed Users -->
    <div class="p-6 bg-white border-t border-gray-100">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
            قائمة الموقعين على القانون (سحابياً)
        </h3>
        <div class="overflow-x-auto rounded-xl border border-gray-100">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-50 text-gray-600 font-bold">
                    <tr>
                        <th class="px-4 py-3">الاسم</th>
                        <th class="px-4 py-3">تاريخ التوقيع</th>
                        <th class="px-4 py-3">الحالة</th>
                    </tr>
                </thead>
                <tbody id="signaturesTableBody" class="divide-y divide-gray-50">
                    <tr>
                        <td colspan="3" class="px-4 py-8 text-center text-gray-400 italic">جاري تحميل قائمة الموقعين...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // البنود القانونية
    const lawData = [
        { t: "1. مبدأ التكافل والمشاركة المجتمعية", c: "يقوم الصندوق على مبدأ التكافل الاجتماعي والتعاون بين أبناء القرية..." },
        { t: "2. تنظيم التبرعات وتوثيقها ومنع التبرع المباشر", c: "جميع التبرعات والمساهمات المالية يجب أن تدخل عبر الصندوق فقط وتوثق رسمياً..." },
        { t: "3. نطاق تغطية الصندوق وحدود مسؤوليته", c: "يقتصر دعم الصندوق على تكاليف العلاج، والفحوصات، والعمليات فقط..." },
        { t: "4. انتهاء مسؤولية الصندوق بعد الوفاة", c: "تنتهي مسؤولية الصندوق فور وفاة الحالة بشكل كامل ونهائي..." },
        { t: "5. تنظيم الحالات البسيطة", c: "الحالات التي تقل تكلفتها عن 200 ألف ريال يمني لا يشملها دعم الصندوق إذا كانت الأسرة مقتدرة." },
        { t: "6. التحقق الصارم من الحالات قبل الدعم", c: "لا يتم اعتماد أي حالة إلا بعد التحقق الكامل والدقيق من صحة الاحتياج." },
        { t: "7. القيادة التنفيذية والصلاحيات المخولة", c: "يتولى الإدارة: مصطفى الشجاع، أحمد بن أحمد الشجاع، نبيل الشجاع، ومحمد بن محمد الشجاع." },
        { t: "8. نظام دعم الحالات الطارئة", c: "يختص الصندوق بدعم الحالات المرضية الطارئة وفق نظام مالي منظم وسقف 2 مليون ريال." },
        { t: "9. الشورى والتصويت", c: "جميع القرارات المصيرية تعتمد بالشورى والتصويت، ويكون قرار الأغلبية ملزمًا." },
        { t: "10. سرية المجموعة وحماية خصوصية العمل", c: "يُمنع منعًا باتًا إخراج أي أسرار من المجموعة، وأي إخلال يعتبر خيانة للأمانة." },
        { t: "11. منع الشقاق وإثارة الفتن", c: "يُمنع منعًا باتًا نقل الأخبار أو إثارة الخلافات أو شق الصف." },
        { t: "12. أخلاقيات وسلوك أعضاء اللجنة", c: "الالتزام بالعقل والحكمة والهدوء وضبط النفس في النقاشات." },
        { t: "13. الالتزام بالحضور والتفاعل الإداري", c: "التغيب عن 3 تصويتات متتالية يؤدي لمنح مهلة 30 يوماً قبل الاستبدال." },
        { t: "14. الإعفاء من العضوية والعقوبات", c: "يحق للإدارة إعفاء أي عضو يثبت عليه الإهمال أو التقصير." },
        { t: "15. الحرمان الكامل من الدعم", c: "من يطلب دعماً ويتواصل سراً مع الناس لجمع تبرعات يحرم من الدعم." },
        { t: "16. أولوية الدعم وربط الحق بالواجب", c: "الأولوية للحالات الأشد خطراً، والالتزام بالمشاركة شرط أساسي للاستفادة." },
        { t: "17. الشفافية المالية وسجل المشاركين", c: "أموال الصندوق أمانة، وهناك رابط رسمي يظهر جميع المشاركين ومساهماتهم." },
        { t: "18. التزام أعضاء الإدارة واللجنة", c: "يلتزم جميع أعضاء الإدارة بإنزال مساهماتهم ليكونوا قدوة للجميع." },
        { t: "19. احترام القرار الجماعي", c: "بعد اتخاذ القرار، يلتزم الجميع باحترامه وعدم إثارة الخلاف حوله." },
        { t: "20. المصلحة العامة فوق الشخصية", c: "مصلحة الصندوق والقرية فوق أي مصلحة شخصية لضمان استمراره." }
    ];

    // Firebase Init
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mahbran-signature-app';

    // Populate Laws
    const lawContainer = document.getElementById('lawContainer');
    lawData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = "law-item p-4 rounded-xl border border-gray-100 bg-gray-50/50 flex gap-4";
        div.innerHTML = `
            <input type="checkbox" class="item-check custom-checkbox mt-1">
            <div>
                <h3 class="font-bold text-gray-800 mb-1 text-sm md:text-base">${item.t}</h3>
                <p class="text-xs md:text-sm text-gray-500 leading-relaxed">${item.c}</p>
            </div>
        `;
        lawContainer.appendChild(div);
    });

    const checks = document.querySelectorAll('.item-check');
    const submitBtn = document.getElementById('submitBtn');
    const fullNameInput = document.getElementById('fullName');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const signaturesTableBody = document.getElementById('signaturesTableBody');

    // Validation Check Function
    function validateForm() {
        const checkedCount = Array.from(checks).filter(c => c.checked).length;
        const nameValid = fullNameInput.value.trim().length >= 8;
        const total = checks.length;
        
        // Update Progress
        const percent = (checkedCount / total) * 100;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `تمت الموافقة على (${checkedCount}/${total}) بنداً`;

        if (checkedCount === total && nameValid) {
            submitBtn.disabled = false;
            submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            submitBtn.classList.remove('cursor-not-allowed');
            submitBtn.querySelector('span').textContent = "أوافق وأرسل التوقيع الآن";
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            submitBtn.classList.add('cursor-not-allowed');
            submitBtn.querySelector('span').textContent = !nameValid && checkedCount === total ? "يرجى كتابة الاسم الثلاثي" : "أكمل الموافقة على البنود";
        }
    }

    // Events
    checks.forEach(c => c.addEventListener('change', () => {
        c.closest('.law-item').classList.toggle('active', c.checked);
        validateForm();
    }));
    fullNameInput.addEventListener('input', validateForm);

    // Auth & Data Sync
    const initApp = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Real-time listener for signatures (Rule 2: Simple query)
                const sigQuery = collection(db, 'artifacts', appId, 'public', 'data', 'verified_signatures');
                onSnapshot(sigQuery, (snapshot) => {
                    signaturesTableBody.innerHTML = '';
                    const docs = snapshot.docs
                        .map(d => d.data())
                        .sort((a, b) => (b.signedAt?.seconds || 0) - (a.signedAt?.seconds || 0));

                    if (docs.length === 0) {
                        signaturesTableBody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-400">لا يوجد موقعون بعد</td></tr>';
                        return;
                    }

                    docs.forEach(data => {
                        const date = data.signedAt ? new Date(data.signedAt.seconds * 1000).toLocaleDateString('ar-EG') : '-';
                        const row = `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-4 py-3 font-medium text-gray-800">${data.name}</td>
                                <td class="px-4 py-3 text-gray-500">${date}</td>
                                <td class="px-4 py-3 text-green-600 font-bold">✓ معتمد</td>
                            </tr>
                        `;
                        signaturesTableBody.insertAdjacentHTML('beforeend', row);
                    });
                }, (err) => console.error(err));
            }
        });
    };

    initApp();

    // Submit Action
    submitBtn.addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) return;

        submitBtn.disabled = true;
        document.getElementById('btnLoader').classList.remove('hidden');

        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'verified_signatures'), {
                name: fullNameInput.value.trim(),
                uid: user.uid,
                signedAt: serverTimestamp(),
                version: '3.0'
            });

            // Reset UI
            fullNameInput.value = '';
            checks.forEach(c => { c.checked = false; c.closest('.law-item').classList.remove('active'); });
            validateForm();
            document.getElementById('btnLoader').classList.add('hidden');
            
            // Custom modal show
            alert("تم إرسال توقيعك وتوثيقه في الجدول بنجاح."); // Simple placeholder, better UI in a real app
        } catch (e) {
            console.error(e);
            submitBtn.disabled = false;
            document.getElementById('btnLoader').classList.add('hidden');
        }
    });
</script>

</body>
</html>
